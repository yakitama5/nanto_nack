name: nanto_nack
description: "NantoNack monorepo workspace root"
publish_to: "none"

environment:
  sdk: ^3.11.3

workspace:
  - apps/app_main
  - packages/system
  - packages/quiz_core
  - packages/quizzes/shopping
  - packages/quizzes/chat
  - packages/quizzes/streaming
  - packages/quizzes/map
  - packages/quizzes/alarm
  - packages/quizzes/payment
  - packages/quizzes/mail
  - packages/quizzes/news
  - packages/quizzes/calendar
  - packages/quizzes/sns
  - packages/quizzes/comic
  - packages/geolocator_windows_stub

dev_dependencies:
  melos: ^7.0.0

melos:
  scripts:
    gen:all:
      description: コードを再生成する
      steps:
        - gen:build
        - gen:slang

    gen:build:  
      description: build_runner を使用してコードを生成する
      run: dart run build_runner build -d
      exec:
        orderDependents: true
      packageFilters:
        dependsOn: build_runner
    gen:build:watch:
      description: build_runner watch を使用して、変更箇所を検知しつつコードを生成する。
      run: dart run build_runner watch -d
      exec:
        orderDependents: true
      packageFilters:
        dependsOn: build_runner

    gen:slang:
      description: slang を使用してコードを生成する
      run: dart run slang
      exec:
        orderDependents: true
      packageFilters:
        dependsOn: slang
    gen:slang:watch:
      description: slang watch を使用して、変更箇所を検知しつつコードを生成する。
      run: dart run slang watch
      exec:
        orderDependents: true
      packageFilters:
        dependsOn: slang

    gen:diff:main:
      description: main ブランチと差分のあるパッケージのみ build_runner と i18n の生成コマンドを実行します。
      steps:
        - gen:build:diff:main
        - gen:i18n:diff:main
    gen:build:diff:main:
      description: main ブランチと差分のあるパッケージのみ build_runner を使用してコードを生成します。
      run: dart run build_runner build -d
      exec:
        orderDependents: true
      packageFilters:
        dependsOn: build_runner
        diff: origin/main...HEAD
    gen:slang:diff:main:
      description: main ブランチと差分のあるパッケージのみ slang を使用して国際化ファイルを生成します。
      run: dart run slang
      exec:
        orderDependents: true
      packageFilters:
        dependsOn: slang
        diff: origin/main...HEAD

    lint:
      run: flutter analyze .
      description: "静的解析 (ワークスペース全体を一括解析するため高速です)"

    test:unit:
      run: melos exec --flutter -- flutter test test/
      description: "ユニットテスト実行"
      packageFilters:
        flutter: true
        dirExists:
          - test

    test:all:
      run: melos exec --flutter -- flutter test
      description: "全テスト実行"
      packageFilters:
        flutter: true
        dirExists:
          - test

    build:web:
      run: |
        cd apps/app_main && flutter build web
      description: "Web ビルド"

    build:android:prod:
      run: |
        cd apps/app_main && "$MELOS_ROOT_PATH/.fvm/flutter_sdk/bin/flutter" build appbundle --release --dart-define-from-file=dart_define/prod.json
      description: "Androidの本番用AppBundleをビルドします"

    build:ios:prod:
      run: |
        cd apps/app_main && "$MELOS_ROOT_PATH/.fvm/flutter_sdk/bin/flutter" build ipa --release --flavor prod --dart-define-from-file=dart_define/prod.json --export-method app-store
      description: "iOSの本番用IPAをビルドします"

    icons:dev:
      run: cd apps/app_main && "$MELOS_ROOT_PATH/.fvm/flutter_sdk/bin/flutter" pub run icons_launcher:create --flavor dev
      description: "開発用アプリアイコンを生成します"

    icons:prod:
      run: cd apps/app_main && "$MELOS_ROOT_PATH/.fvm/flutter_sdk/bin/flutter" pub run icons_launcher:create --flavor prod
      description: "本番用アプリアイコンを生成します"

    firebase:dev:
      run: >
        flutterfire configure
        --out="$MELOS_ROOT_PATH/packages/system/lib/src/firebase/firebase_options_dev.dart"
        --android-out="android/app/src/dev/res/google-services.json"
        --ios-out="ios/dev/GoogleService-Info.plist"
        -p nanto-nack-dev
        --platforms=android,ios,web
        -i com.yakuran.nantoNack.dev
        -a com.yakuran.nanto_nack.dev
        --yes
      description: "Firebase設定を生成し、systemパッケージに出力します"
      exec:
        concurrency: 1
      packageFilters:
        scope: "app_main"

    firebase:prod:
      run: >
        flutterfire configure
        --out="$MELOS_ROOT_PATH/packages/system/lib/src/firebase/firebase_options.dart"
        --android-out="android/app/src/prod/res/google-services.json"
        --ios-out="ios/prod/GoogleService-Info.plist"
        -p nanto-nack
        --platforms=android,ios,web
        -i com.yakuran.nantoNack
        -a com.yakuran.nanto_nack
        --yes
      description: "Firebase設定を生成し、systemパッケージに出力します"
      exec:
        concurrency: 1
      packageFilters:
        scope: "app_main"
