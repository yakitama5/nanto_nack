name: geolocator_windows
description: "Windows 向け geolocator スタブ。NuGet 不要で位置情報を常に無効として返す。"
publish_to: "none"
version: 0.2.3

environment:
  sdk: ^3.11.3

resolution: workspace

dependencies:
  flutter:
    sdk: flutter
  geolocator_platform_interface: ">=4.2.4 <5.0.0"
  plugin_platform_interface: ^2.1.8

flutter:
  plugin:
    implements: geolocator
    platforms:
      windows:
        dartPluginClass: GeolocatorWindows
