name: Version Up

on:
  workflow_dispatch:
    inputs:
      bump_type:
        description: 'Update Type'
        required: true
        default: 'patch'
        type: choice
        options: [patch, minor, major, build]

jobs:
  version_up:
    name: バージョンアップ (${{ github.event.inputs.bump_type }})
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Flutter バージョンの取得 (.fvmrc)
        id: fvm
        run: echo "version=$(jq -r '.flutter' .fvmrc)" >> $GITHUB_OUTPUT

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ steps.fvm.outputs.version }}
          cache: true

      - name: Cider のインストール
        run: dart pub global activate cider

      - name: バージョンのバンプ
        id: bump
        run: |
          cd apps/app_main
          # バンプ前のビルド番号を保存（リセットされないよう常にインクリメント）
          CURRENT_VERSION=$(dart pub global run cider version)
          CURRENT_BUILD=$(echo "$CURRENT_VERSION" | sed 's/.*+//')
          # '+' が存在しない場合（ビルド番号なし）は 0 とする
          if [ "$CURRENT_BUILD" = "$CURRENT_VERSION" ]; then CURRENT_BUILD=0; fi

          if [ "${{ github.event.inputs.bump_type }}" != "build" ]; then
            dart pub global run cider bump ${{ github.event.inputs.bump_type }}
          fi

          # バンプ後のベースバージョンを取得し、ビルド番号を +1 して設定
          NEW_BUILD=$((CURRENT_BUILD + 1))
          NEW_BASE=$(dart pub global run cider version | sed 's/+.*//')
          dart pub global run cider set-version "${NEW_BASE}+${NEW_BUILD}"
          NEW_VERSION=$(dart pub global run cider version)
          echo "new_version=${NEW_VERSION}" >> $GITHUB_OUTPUT

      - name: 変更のコミットとタグの作成
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add apps/app_main/pubspec.yaml
          git commit -m "🔖tag: v${{ steps.bump.outputs.new_version }} へバージョンアップ"
          git tag "v${{ steps.bump.outputs.new_version }}"
          git push origin HEAD:${{ github.ref_name }}
          git push origin "v${{ steps.bump.outputs.new_version }}"
