name: Build and Publish

on:
  workflow_dispatch:
    inputs:
      platform:
        description: 'Platform to build'
        required: true
        default: 'all'
        type: choice
        options: [all, ios, android]

jobs:
  build:
    name: ビルド＆配布 (${{ github.event.inputs.platform }})
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v4

      # https://github.com/kuhnroyal/flutter-fvm-config-action
      - name: FVM 設定の取得
        uses: kuhnroyal/flutter-fvm-config-action/setup@v3
        id: fvm-config-action

      # https://github.com/subosito/flutter-action
      - name: Flutter のセットアップ
        uses: subosito/flutter-action@1c5eb12d812966ca84680edc38353a0851c8fd56 # v2.14.0
        with:
          flutter-version: ${{ steps.fvm-config-action.outputs.FLUTTER_VERSION }}
          channel: ${{ steps.fvm-config-action.outputs.FLUTTER_CHANNEL }}
          cache: true

      - name: .fvm/flutter_sdk シンボリックリンクの作成 (melos スクリプト用)
        run: |
          mkdir -p .fvm
          ln -sf "$(dirname $(dirname $(which flutter)))" .fvm/flutter_sdk

      - name: Pub キャッシュの復元
        uses: actions/cache@v4
        with:
          path: ~/.pub-cache
          key: pub-${{ runner.os }}-${{ hashFiles('**/pubspec.yaml') }}
          restore-keys: pub-${{ runner.os }}-

      - name: Melos & CodeMagic CLI のインストール
        run: |
          dart pub global activate melos
          echo "$HOME/.pub-cache/bin" >> $GITHUB_PATH
          pip install codemagic-cli-tools

      - name: Firebase 設定ファイルの復元
        run: |
          mkdir -p apps/app_main/android/app/src/prod/res
          mkdir -p apps/app_main/ios/prod
          mkdir -p packages/system/lib/src/firebase
          echo "${{ secrets.GOOGLE_SERVICES_JSON_PROD_BASE64 }}" | base64 -d > apps/app_main/android/app/src/prod/res/google-services.json
          echo "${{ secrets.GOOGLE_SERVICE_INFO_PLIST_PROD_BASE64 }}" | base64 -d > apps/app_main/ios/prod/GoogleService-Info.plist
          echo "${{ secrets.FIREBASE_OPTIONS_DART_BASE64 }}" | base64 -d > packages/system/lib/src/firebase/firebase_options.dart
          echo "${{ secrets.FIREBASE_OPTIONS_DEV_DART_BASE64 }}" | base64 -d > packages/system/lib/src/firebase/firebase_options_dev.dart

      - name: .env ファイルの作成
        run: |
          mkdir -p apps/app_main/env
          echo "${{ secrets.APP_MAIN_ENV_BASE64 }}" | base64 -d > apps/app_main/env/.env
          echo "${{ secrets.APP_MAIN_ENV_DEV_BASE64 }}" | base64 -d > apps/app_main/env/.env.dev

      - name: 依存関係の解決 (melos bootstrap)
        run: melos bootstrap

      - name: コード生成 (build_runner)
        run: melos run generate:all

      # ────────────────────────────────────────────
      # iOS ビルド＆App Store Connect へ配布
      # ────────────────────────────────────────────
      - name: iOS ビルド＆配布
        if: ${{ github.event.inputs.platform == 'all' || github.event.inputs.platform == 'ios' }}
        env:
          APP_STORE_CONNECT_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}
          APP_STORE_CONNECT_KEY_IDENTIFIER: ${{ secrets.APP_STORE_CONNECT_KEY_IDENTIFIER }}
          APP_STORE_CONNECT_PRIVATE_KEY: ${{ secrets.APP_STORE_CONNECT_PRIVATE_KEY }}
          CERTIFICATE_PRIVATE_KEY: ${{ secrets.CERTIFICATE_PRIVATE_KEY }}
        run: |
          # 1. キーチェーンの初期化
          keychain initialize
          # 2. 証明書とプロビジョニングプロファイルの取得（CodeMagic CLI）
          app-store-connect fetch-signing-files "com.yakuran.nantoNack" --type IOS_APP_STORE --create
          # 3. キーチェーンへの追加とXcodeプロジェクトへの適用
          keychain add-certificates
          xcode-project use-profiles
          # 4. Melos経由でビルド
          melos run build:ios:prod
          # 5. App Store Connect へアップロード
          app-store-connect publish --path apps/app_main/build/ios/ipa/*.ipa

      # ────────────────────────────────────────────
      # Android ビルド＆Google Play へ配布
      # ────────────────────────────────────────────
      - name: Android ビルド＆配布
        if: ${{ github.event.inputs.platform == 'all' || github.event.inputs.platform == 'android' }}
        env:
          GCLOUD_SERVICE_ACCOUNT_CREDENTIALS: ${{ secrets.GPLAY_SERVICE_ACCOUNT }}
        run: |
          # 1. Base64化されたKeystoreを復元
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > apps/app_main/android/app/keystore.jks
          # 2. key.properties ファイルの生成
          cat <<EOF > apps/app_main/android/key.properties
          storePassword=${{ secrets.KEYSTORE_PASSWORD }}
          keyPassword=${{ secrets.KEY_PASSWORD }}
          keyAlias=${{ secrets.KEY_ALIAS }}
          storeFile=keystore.jks
          EOF
          # 3. Melos経由でビルド
          melos run build:android:prod
          # 4. Google Play へアップロード（内部テストトラック）
          google-play publish \
            --track internal \
            --package-name com.yakuran.nanto_nack \
            --artifact-path apps/app_main/build/app/outputs/bundle/release/app-release.aab
