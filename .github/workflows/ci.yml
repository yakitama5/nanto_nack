name: CI

on:
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.event.number }}
  cancel-in-progress: true

jobs:
  # ──────────────────────────────────────────────
  # Job 1: 静的解析
  # ──────────────────────────────────────────────
  analyze:
    name: 静的解析
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Flutter バージョンの取得 (.fvmrc)
        id: fvm
        run: echo "version=$(jq -r '.flutter' .fvmrc)" >> $GITHUB_OUTPUT

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ steps.fvm.outputs.version }}
          cache: true

      - name: Pub キャッシュの復元
        uses: actions/cache@v4
        with:
          path: ~/.pub-cache
          key: pub-${{ runner.os }}-${{ hashFiles('**/pubspec.yaml') }}
          restore-keys: pub-${{ runner.os }}-

      - name: Melos のインストール
        run: dart pub global activate melos

      - name: Firebase 設定ファイルの復元
        run: |
          mkdir -p apps/app_main/android/app/src/dev/res
          mkdir -p apps/app_main/android/app/src/prod/res
          mkdir -p apps/app_main/ios/dev
          mkdir -p apps/app_main/ios/prod
          mkdir -p packages/system/lib/src/firebase
          echo "${{ secrets.GOOGLE_SERVICES_JSON_DEV_BASE64 }}" | base64 -d > apps/app_main/android/app/src/dev/google-services.json
          echo "${{ secrets.GOOGLE_SERVICES_JSON_PROD_BASE64 }}" | base64 -d > apps/app_main/android/app/src/prod/google-services.json
          echo "${{ secrets.GOOGLE_SERVICE_INFO_PLIST_DEV_BASE64 }}" | base64 -d > apps/app_main/ios/dev/GoogleService-Info.plist
          echo "${{ secrets.GOOGLE_SERVICE_INFO_PLIST_PROD_BASE64 }}" | base64 -d > apps/app_main/ios/prod/GoogleService-Info.plist
          echo "${{ secrets.FIREBASE_OPTIONS_DART_BASE64 }}" | base64 -d > packages/system/lib/src/firebase/firebase_options.dart
          echo "${{ secrets.FIREBASE_OPTIONS_DEV_DART_BASE64 }}" | base64 -d > packages/system/lib/src/firebase/firebase_options_dev.dart

      - name: .env ファイルの作成
        run: |
          mkdir -p apps/app_main/env
          echo "${{ secrets.APP_MAIN_ENV_BASE64 }}" | base64 -d > apps/app_main/env/.env
          echo "${{ secrets.APP_MAIN_ENV_DEV_BASE64 }}" | base64 -d > apps/app_main/env/.env.dev

      - name: 依存関係の解決 (melos bootstrap)
        run: dart pub global run melos bootstrap

      - name: コード生成 (build_runner)
        run: dart pub global run melos run generate

      - name: 静的解析 (flutter analyze)
        run: dart pub global run melos run lint

  # ──────────────────────────────────────────────
  # Job 2: テスト
  # ──────────────────────────────────────────────
  test:
    name: テスト
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Flutter バージョンの取得 (.fvmrc)
        id: fvm
        run: echo "version=$(jq -r '.flutter' .fvmrc)" >> $GITHUB_OUTPUT

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ steps.fvm.outputs.version }}
          cache: true

      - name: Pub キャッシュの復元
        uses: actions/cache@v4
        with:
          path: ~/.pub-cache
          key: pub-${{ runner.os }}-${{ hashFiles('**/pubspec.yaml') }}
          restore-keys: pub-${{ runner.os }}-

      - name: Melos のインストール
        run: dart pub global activate melos

      - name: Firebase 設定ファイルの復元
        run: |
          mkdir -p apps/app_main/android/app/src/dev/res
          mkdir -p apps/app_main/android/app/src/prod/res
          mkdir -p apps/app_main/ios/dev
          mkdir -p apps/app_main/ios/prod
          mkdir -p packages/system/lib/src/firebase
          echo "${{ secrets.GOOGLE_SERVICES_JSON_DEV_BASE64 }}" | base64 -d > apps/app_main/android/app/src/dev/res/google-services.json
          echo "${{ secrets.GOOGLE_SERVICES_JSON_PROD_BASE64 }}" | base64 -d > apps/app_main/android/app/src/prod/res/google-services.json
          echo "${{ secrets.GOOGLE_SERVICE_INFO_PLIST_DEV_BASE64 }}" | base64 -d > apps/app_main/ios/dev/GoogleService-Info.plist
          echo "${{ secrets.GOOGLE_SERVICE_INFO_PLIST_PROD_BASE64 }}" | base64 -d > apps/app_main/ios/prod/GoogleService-Info.plist
          echo "${{ secrets.FIREBASE_OPTIONS_DART_BASE64 }}" | base64 -d > packages/system/lib/src/firebase/firebase_options.dart
          echo "${{ secrets.FIREBASE_OPTIONS_DEV_DART_BASE64 }}" | base64 -d > packages/system/lib/src/firebase/firebase_options_dev.dart

      - name: .env ファイルの作成
        run: |
          mkdir -p apps/app_main/env
          echo "${{ secrets.APP_MAIN_ENV_BASE64 }}" | base64 -d > apps/app_main/env/.env
          echo "${{ secrets.APP_MAIN_ENV_DEV_BASE64 }}" | base64 -d > apps/app_main/env/.env.dev

      - name: 依存関係の解決 (melos bootstrap)
        run: dart pub global run melos bootstrap

      - name: コード生成 (build_runner)
        run: dart pub global run melos run generate

      - name: テスト実行 (flutter test)
        run: dart pub global run melos run test:all

      - name: テスト失敗時の成果物アップロード
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: test-failures-${{ github.event.number }}-${{ github.sha }}
          path: |
            **/test/failures/
            **/goldens/failures/
          retention-days: 7
