			runOnlyForDeploymentPostprocessing = 0;
			shellPath = /bin/sh;
			shellScript = "# dart-defines から flavor を取得して GoogleService-Info.plist をコピー\nfunction decode_url() { echo \"${*}\" | base64 --decode; }\n\nIFS=',' read -r -a define_items <<<\"$DART_DEFINES\"\nFLAVOR=\"\"\n\nfor index in \"${!define_items[@]}\"\ndo\n    item=$(decode_url \"${define_items[$index]}\")\n    if [[ $item == flavor=* ]]; then\n        FLAVOR=\"${item#flavor=}\"\n    fi\ndone\n\nif [ -z \"$FLAVOR\" ]; then\n    echo \"warning: flavor not found in dart-defines, defaulting to dev\"\n    FLAVOR=\"dev\"\nfi\n\nSOURCE=\"${SRCROOT}/${FLAVOR}/GoogleService-Info.plist\"\nDEST=\"${BUILT_PRODUCTS_DIR}/${PRODUCT_NAME}.app/GoogleService-Info.plist\"\n\nif [ -f \"$SOURCE\" ]; then\n    cp \"$SOURCE\" \"$DEST\"\n    echo \"Copied GoogleService-Info.plist for flavor: $FLAVOR\"\nelse\n    echo \"warning: GoogleService-Info.plist not found at $SOURCE\"\nfi\n";
		};
