name: app_main
description: "NantoNack メインアプリ"
publish_to: "none"
version: 1.0.2+3

environment:
  sdk: ^3.11.3

resolution: workspace

dependencies:
  clock: ^1.1.2
  cupertino_icons: ^1.0.8
  lottie: ^3.3.1
  envied: ^1.3.3
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  flutter_riverpod: ^2.6.1
  geolocator: ^13.0.2
  # NuGet（WinLocation）のダウンロードエラーを回避するため、
  # Windows 向け実装をスタブに差し替える。
  geolocator_windows:
    path: ../../packages/geolocator_windows_stub
  go_router: ^14.8.1
  http: ^1.2.2
  package_info_plus: ^8.3.0
  shared_preferences: ^2.5.3
  store_redirect: ^2.0.2
  url_launcher: ^6.3.1
  quiz_core:
    path: ../../packages/quiz_core
  responsive_framework: ^1.5.1
  chat:
    path: ../../packages/quizzes/chat
  streaming:
    path: ../../packages/quizzes/streaming
  shopping:
    path: ../../packages/quizzes/shopping
  map:
    path: ../../packages/quizzes/map
  alarm:
    path: ../../packages/quizzes/alarm
  payment:
    path: ../../packages/quizzes/payment
  slang_flutter: ^4.3.1
  system:
    path: ../../packages/system
  tutorial_coach_mark: ^1.2.9
  flutter_svg: ^2.0.10+1

dev_dependencies:
  alchemist: ^0.14.0
  altive_lints: ^2.2.0
  build_runner: ^2.4.14
  envied_generator: ^1.3.3
  flutter_test:
    sdk: flutter
  icons_launcher: ^3.0.0
  mocktail: ^1.0.4

flutter:
  uses-material-design: true
  assets:
    - assets/images/weather/
    - assets/lottie/
    - assets/launcher_icon/
